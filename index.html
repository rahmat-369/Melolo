<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        body { background-color: #0b1120; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-glow { box-shadow: 0 0 15px rgba(14, 165, 233, 0.3); }
        .gradient-overlay { background: linear-gradient(to top, rgba(11, 17, 32, 1) 0%, rgba(11, 17, 32, 0.5) 60%, transparent 100%); }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-40 glass-panel px-4 py-4 mb-4">
        <div class="max-w-md mx-auto flex gap-3 items-center">
            <div class="relative flex-1">
                <input type="text" id="searchInput" placeholder="Cari anime atau drama..." class="w-full bg-[#1e293b] text-sm text-white rounded-full py-2.5 pl-10 pr-4 outline-none border border-slate-700 focus:border-[#0ea5e9] transition-colors shadow-inner">
                <svg class="w-4 h-4 text-slate-400 absolute left-3.5 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <button id="searchBtn" class="bg-[#0ea5e9] text-white p-2.5 rounded-full neon-glow transition-transform active:scale-95">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
        </div>
    </div>

    <div class="p-4 max-w-md mx-auto" id="main-content">
        
        <div id="home-view">
            <div class="bg-[#1e293b]/50 border border-slate-700/50 p-4 rounded-xl mb-6 relative overflow-hidden glass-panel">
                <div class="absolute left-0 top-0 w-1 h-full bg-[#0ea5e9]"></div>
                <p class="text-[13px] text-slate-300 leading-relaxed font-medium">Kami berupaya memberikan yang terbaik untuk Anda.<br>Terimakasih atas dukungannya 😊</p>
            </div>

            <h2 class="text-lg font-bold mb-4">Semua Kategori</h2>
            <div class="flex gap-2.5 overflow-x-auto scrollbar-hide mb-8">
                <button class="px-5 py-2 bg-[#0ea5e9] rounded-xl text-[13px] font-semibold text-white neon-glow shrink-0">Semua</button>
                <button class="px-5 py-2 bg-[#1e293b] rounded-xl text-[13px] font-medium text-slate-300 shrink-0">Anime</button>
                <button class="px-5 py-2 bg-[#1e293b] rounded-xl text-[13px] font-medium text-slate-300 shrink-0">Action</button>
                <button class="px-5 py-2 bg-[#1e293b] rounded-xl text-[13px] font-medium text-slate-300 shrink-0">Fantasy</button>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Sedang Populer</h2>
                <span class="text-[11px] text-slate-400 font-bold tracking-wider cursor-pointer hover:text-white">LIHAT SEMUA &gt;</span>
            </div>
            <div id="populer-container" class="flex gap-3 overflow-x-auto scrollbar-hide mb-8 snap-x">
                <p class="text-sm text-slate-500 animate-pulse">Memuat data...</p>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Episode Terbaru</h2>
                <span class="text-[11px] text-slate-400 font-bold tracking-wider cursor-pointer hover:text-white">LIHAT JADWAL &gt;</span>
            </div>
            <div id="terbaru-container" class="grid grid-cols-2 gap-3 pb-4">
                <p class="text-sm text-slate-500 animate-pulse col-span-2">Memuat data...</p>
            </div>
        </div>

        <div id="search-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">Hasil Pencarian</h2>
                <button id="backBtn" class="text-[11px] bg-slate-800 px-3 py-1 rounded text-slate-300 font-bold">KEMBALI</button>
            </div>
            <div id="search-results-container" class="grid grid-cols-2 gap-3 pb-4">
                </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 w-full glass-panel p-2 px-6 flex justify-between items-center z-50">
        <div class="flex flex-col items-center text-[#0ea5e9] cursor-pointer">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </div>
        <div class="flex flex-col items-center text-slate-500 cursor-pointer">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-semibold">Schedule</span>
        </div>
        <div class="flex flex-col items-center text-slate-500 cursor-pointer">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            <span class="text-[10px] font-semibold">Catalog</span>
        </div>
        <div class="flex flex-col items-center text-slate-500 cursor-pointer">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
            <span class="text-[10px] font-semibold">Library</span>
        </div>
        <div class="flex flex-col items-center text-slate-500 cursor-pointer">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-semibold">Profile</span>
        </div>
    </div>

    <script>
        // --- Helper Rendering Card ---
        function createCard(item, isPopuler = false) {
            const isTamat = !item.episodes || item.episodes.toLowerCase().includes('tamat');
            const badgeBg = isTamat ? 'bg-[#ef4444]' : 'bg-[#0ea5e9]';
            const badgeText = isTamat ? 'TAMAT' : (item.episodes || 'NEW');

            if(isPopuler) {
                return `
                <div class="min-w-[130px] w-[130px] relative rounded-xl overflow-hidden shadow-lg snap-start cursor-pointer group">
                    <img src="${item.image}" class="w-full h-[180px] object-cover transition-transform duration-300 group-hover:scale-105" referrerpolicy="no-referrer">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="w-10 h-10 rounded-full bg-black/60 backdrop-blur border border-white/20 flex items-center justify-center"><svg class="w-5 h-5 text-white ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg></div>
                    </div>
                    <div class="absolute inset-0 gradient-overlay"></div>
                    <div class="absolute bottom-2 left-2 right-2">
                        <p class="text-[10px] font-bold text-[#0ea5e9] mb-0.5">Populer</p>
                        <p class="text-xs font-bold text-white leading-tight line-clamp-2">${item.title}</p>
                    </div>
                </div>`;
            }

            return `
            <div class="relative rounded-xl overflow-hidden bg-[#1e293b] shadow-lg cursor-pointer group border border-slate-800 hover:border-slate-600 transition-colors">
                <div class="absolute top-2 left-2 ${badgeBg} text-white text-[9px] font-bold px-1.5 py-0.5 rounded shadow-md z-10 tracking-wide uppercase">${badgeText}</div>
                <img src="${item.image}" class="w-full h-[200px] object-cover transition-transform duration-300 group-hover:scale-105" referrerpolicy="no-referrer">
                <div class="absolute inset-0 gradient-overlay"></div>
                <div class="absolute bottom-2 left-2 right-2">
                    <p class="text-[10px] font-bold text-slate-400 mb-0.5">${item.category || (isTamat ? 'Tamat' : 'Ongoing')}</p>
                    <p class="text-[13px] font-bold text-white leading-tight line-clamp-2">${item.title}</p>
                </div>
            </div>`;
        }

        // --- Fetch Data ---
        async function loadHome() {
            try {
                const res = await fetch('/api/home');
                const result = await res.json();
                if (result.success) {
                    const popData = result.data.filter(x => x.type === 'banner' || x.type === 'card');
                    const terData = result.data.filter(x => x.type === 'list');

                    document.getElementById('populer-container').innerHTML = popData.map(i => createCard(i, true)).join('');
                    document.getElementById('terbaru-container').innerHTML = terData.map(i => createCard(i)).join('');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('search-view').classList.remove('hidden');
            
            const container = document.getElementById('search-results-container');
            container.innerHTML = '<p class="text-sm text-slate-500 col-span-2 animate-pulse">Mencari data...</p>';

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const result = await res.json();
                
                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(i => createCard(i)).join('');
                } else {
                    container.innerHTML = '<p class="text-sm text-slate-500 col-span-2">Tidak ditemukan hasil.</p>';
                }
            } catch (e) {
                container.innerHTML = '<p class="text-sm text-red-400 col-span-2">Gagal mencari data.</p>';
            }
        }

        // --- Event Listeners ---
        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
        });

        // Init
        loadHome();
    </script>
</body>
</html>
